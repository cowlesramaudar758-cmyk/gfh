<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feirão Especial</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(180deg,#ff0f4b,#ff4b4b);
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
height:100vh;
color:white;
text-align:center;
}

/* TOPO */

.topo{
width:100%;
background:linear-gradient(90deg,#b4003a,#ff0066);
padding:25px 10px;
box-shadow:0 4px 20px rgba(0,0,0,0.2);
}

.topo h1{
font-size:40px;
font-weight:800;
letter-spacing:3px;
color:#ffd43b;
text-shadow:0 4px 10px rgba(0,0,0,0.4);
}

/* CONTEÚDO */

.container{
margin-top:40px;
width:90%;
max-width:400px;
}

.logo{
width:100%;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* TEXTO */

.texto{
margin-top:25px;
font-size:18px;
font-weight:500;
}

/* BOTÃO */

.botao{
margin-top:30px;
display:inline-block;
background:#ffd43b;
color:#000;
padding:16px 35px;
border-radius:50px;
font-weight:700;
text-decoration:none;
font-size:18px;
transition:0.3s;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

.botao:hover{
transform:scale(1.05);
background:white;
}

/* MOBILE */

@media(max-width:480px){

.topo h1{
font-size:34px;
}

.texto{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="topo">
<h1>FEIRÃO</h1>
</div>

<div class="container">

<img src="sua-imagem.png" class="logo">

<div class="texto">
Grandes ofertas disponíveis agora
</div>

<a href="#" class="botao">
VER OFERTAS
</a>

</div>

</body>
</html>
